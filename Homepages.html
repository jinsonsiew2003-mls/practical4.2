<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Page</title>

    <style>
        body{
            font-family: Verdana, sans-serif;
            margin: 0;
            background-color: #e9eef3;
        }

        header{
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav{
            background: #34495e;
            padding: 12px;
            text-align: center;
        }

        nav a{
            color: #ecf0f1;
            margin: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        nav a:hover{
            color: #f1c40f;
        }

        .container{
            padding: 25px;
            text-align: center;
        }

        .container h2{
            color: #2c3e50;
        }

        img{
            margin-top: 15px;
            border-radius: 8px;
        }

        footer{
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Personal Website</h1>
    <p>A simple webpage created with HTML & CSS</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About Me</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Hello There!</h2>
    <p>This is my homepage. Feel free to explore the website.</p>

    <img src="https://via.placeholder.com/400" alt="Sample Image">

</div>

<footer>
    <p>© 2026 My Personal Website</p>
</footer>

</body>
</html>
