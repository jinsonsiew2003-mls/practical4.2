<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header{
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav{
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a{
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover{
            color: yellow;
        }

        .container{
            padding: 20px;
            text-align: center;
        }

        footer{
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Homepage</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Hello!</h2>
    <p>This is my homepage. You can add your content here.</p>
    <p>Hi is my home page nice?</p>
    <img src="https://via.placeholder.com/400" alt="Sample Image">

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
